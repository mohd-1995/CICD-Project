permissions: write-all

name: 'Build and Deploy with Pre-Deployment Security Scan and tfsec Analysis'

on:
  push:
    branches:
      - main

jobs:
  deploy-infrastructure:
    name: 'Build, Security Scan, tfsec Analysis, and Deploy Terraform Infrastructure'
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy

      - name: Run Trivy vulnerability scanner on filesystem and save output
        run: |
          trivy filesystem . > trivy-results.log
      
      - name: Run Trivy Vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          trivy-config: tf.yml

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2
      
      - name: Upload Trivy scan results to S3
        run: |
          aws s3 cp trivy-results.log s3://git-mo-aws/trivy-${{ github.run_id }}.json --debug
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.6.2

      - name: Terraform Init
        run: terraform init
        working-directory: ./infrastructure

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: ./infrastructure

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./infrastructure

      # Integration of tfsec steps starts here
      - name: Install tfsec
        run: |
          wget https://github.com/aquasecurity/tfsec/releases/download/v1.0.0/tfsec-linux-amd64
          chmod +x tfsec-linux-amd64
          sudo mv tfsec-linux-amd64 /usr/local/bin/tfsec
      
      - name: Run tfsec and capture output
        run: |
          mkdir -p ./results
          tfsec ./infrastructure --soft-fail > ./results/results.txt

      - name: Install AWS CLI
        run: sudo apt-get install awscli

      - name: Upload tfsec results to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: 'eu-west-2' 
        run: |
          aws s3 cp ./results/results.txt s3://git-mo-aws/tfsec/results.txt

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./infrastructure
