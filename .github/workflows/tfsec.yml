
name: tfsec
on:
    push:
      branches: [ "main" ]
    pull_request:
      branches: [ "main" ]
    schedule:
      - cron: '20 14 * * 3'
    
  pull_request:
jobs:
  tfsec:
    name: tfsec
    runs-on: ubuntu-latest
    permissions:
        actions: read
        contents: read
        security-events: write

    steps:
      - name: Clone repo
        uses: actions/checkout@master
      - name: tfsec
        uses: aquasecurity/tfsec-sarif-action@21ded20e8ca120cd9d3d6ab04ef746477542a608
        with:
          working_directory: ./infrastructure
