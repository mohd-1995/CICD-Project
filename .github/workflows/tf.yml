name: 'CI with Trivy Scan and S3 Upload'

    on:
      push:
        branches:
          - main
      pull_request:
    
    jobs:
      trivy_scan_and_upload:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v2
    
          - name: Configure AWS credentials
            uses: aws-actions/configure-aws-credentials@v1
            with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: eu-west-2
    
          - name: Run Trivy vulnerability scanner
            run: |
              trivy filesystem --format json -o trivy-results.json .
    
          - name: Upload Trivy scan results to S3
            run: |
              aws s3 cp trivy-results.json s3://git-mo-aws/trivy-results-${{ github.run_id }}.json
  