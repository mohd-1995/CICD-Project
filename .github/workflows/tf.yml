name: 'Build and Deploy with Pre-Deployment Security Scan'

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-deploy:
    name: 'Build, Security Scan, and Deploy Terraform Infrastructure'
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          trivy-config: tf.yaml
          format: 'json'
          output: 'trivy-results.json'
      
      - name: Upload Trivy scan results to S3
        run: aws s3 cp trivy-results.json s3://git-mo-aws

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.6.2

      - name: Terraform Init
        run: terraform init
        working-directory: ./infrastructure

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./infrastructure

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./infrastructure

      - name: Wait for 3 Minutes
        run: sleep 180

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: ./infrastructure

