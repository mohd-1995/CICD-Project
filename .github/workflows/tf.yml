name: TFSec Scan And Report
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tfsec:
    name: Run tfsec sarif report
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Sync S3 Bucket
        run: aws s3 sync s3://git-mo-aws/tfsec ./infrastructure

      - name: Install tfsec
        run: |
          wget -O tfsec https://github.com/aquasecurity/tfsec/releases/download/v1.28.5/tfsec-linux-amd64
          chmod +x tfsec
          sudo mv tfsec /usr/local/bin/

      - name: Run tfsec
        run: tfsec ./infrastructure --out=tfsec-results.sarif --format=sarif
        continue-on-error: true  # This will ensure the step doesn't cause the workflow to fail

      - name: Upload SARIF file to GitHub
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: tfsec-results.sarif
