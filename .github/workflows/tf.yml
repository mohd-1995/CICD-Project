name: 'Build and Deploy with Pre-Deployment Security Scan'

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-deploy:
    name: 'Build, Security Scan, and Deploy Terraform Infrastructure'
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          trivy-config: trivy.yaml

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.6.2

      - name: Terraform Init
        run: terraform init
        working-directory: ./infrastructure

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./infrastructure

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./infrastructure
      
      - name: Save Trivy Scan Result
        run: trivy filesystem --format json --output trivy_scan_results.json .
        working-directory: ./infrastructure

      - name: Upload Trivy Scan Results to S3
        run: aws S3 cp trivy_scan_results.json s3://codacy-result/${{ github.run_id }}/trivy_scan_results.json

      - name: Wait for 5 Minutes
        run: sleep 600

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: ./infrastructure
