name: Trivy Container Image Scan

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]

jobs:
  fs-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Run Trivy vulnerability scanner in fs mode
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        ignore-unfixed: true
        format: 'table'
        severity: 'LOW'
    
    - name: Upload filesystem scan results as an artifact
      uses: actions/upload-artifact@v2
      with:
        name: fs-scan-results
        path: trivy-fs-results.table

  container_scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1
    
    - name: Login into docker hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v2
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64, linux/amd64
        push: true
        tags: mohd1995/testing:latest

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'mohd1995/testing:latest'
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: 'os, library'
        severity: 'CRITICAL,HIGH'

    - name: Run Trivy vulnerability scanner and save results
      run: trivy filesystem --format table --severity LOW . > trivy-fs-results.table

    - name: Upload container scan results as an artifact
      uses: actions/upload-artifact@v2
      with:
        name: container-scan-results
        path: trivy-container-results.table

  config-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Run Trivy vulnerability scanner in IaC mode
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scanners: 'config'
        scan-ref: './infrastructure'
        hide-progress: false
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRTIICAL,HIGH'
        trivy-config: trivy-fs.ml
    
    - name: Upload IaC scan results as an artifact
      uses: actions/upload-artifact@v2
      with:
        name: iac-scan-results
        path: trivy-config-results.table
